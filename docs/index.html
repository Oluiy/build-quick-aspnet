<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>BuildQuickPkg Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <meta name="description" content="Docs for BuildQuickPkg, an interactive .NET CLI that scaffolds Clean Architecture ASP.NET Core solutions.">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@5/dist/themes/addons/core-dark.min.css" media="(prefers-color-scheme: dark)" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@5/dist/themes/addons/vue.min.css" />
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'BuildQuickPkg',
      repo: 'https://github.com/Oluiy/build-quick-aspnet',
      homepage: 'guides/README.md',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      search: {
        depth: 4,
        noData: 'No results.',
        placeholder: 'Search docs...'
      },
      copyCode: {
        buttonText: 'Copy',
        errorText: 'Error',
        successText: 'Copied',
      },
      plugins: [
        function (hook, vm) {
          hook.afterEach(function (html) {
            return html + '<hr/><div id="page-footer"></div>'
          })
          hook.doneEach(function () {
            fetch('_about.md')
              .then(function (res) { return res.text() })
              .then(function (md) {
                var el = document.getElementById('page-footer')
                if (el) el.innerHTML = vm.compiler.compile(md)
              })
          })
        }
      ]
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
</body>
</html>
